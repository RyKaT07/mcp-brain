# mcp-brain — production compose
#
# Mounts:
#   ./data/knowledge        → /data/knowledge        (markdown KB, git-tracked, RW)
#   ./data/auth.yaml        → /data/auth.yaml        (yaml bearer tokens, RO)
#   ./data/oauth-state.json → /data/oauth-state.json (OAuth-issued tokens + clients, RW)
#
# Port binding is controlled by MCP_PORT_BIND (see .env.example):
#   - default 127.0.0.1 — safest, forward from a reverse proxy on the
#     SAME host/LXC (Caddy/Traefik/nginx container or sibling on the
#     same bridge). This is what you want 90% of the time.
#   - 0.0.0.0 — required when your reverse proxy lives on a DIFFERENT
#     host and reaches this LXC over its LAN IP (cross-LXC Caddy,
#     Caddy on the Proxmox host, etc.). You still MUST restrict the
#     port with a firewall — mcp-brain's bearer auth is not meant to
#     be internet-facing by itself.

services:
  mcp-brain:
    image: ${MCP_BRAIN_IMAGE:-ghcr.io/RyKaT07/mcp-brain:latest}
    container_name: mcp-brain
    restart: unless-stopped
    ports:
      - "${MCP_PORT_BIND:-127.0.0.1}:8400:8400"
    environment:
      MCP_TRANSPORT: http
      MCP_HOST: 0.0.0.0
      MCP_PORT: "8400"
      MCP_KNOWLEDGE_DIR: /data/knowledge
      MCP_AUTH_CONFIG: /data/auth.yaml
      MCP_PUBLIC_URL: ${MCP_PUBLIC_URL:-http://localhost:8400/}
      # OAuth 2.1 authorization server state — required for claude.ai
      # Custom Connectors (web/iOS/Android/desktop chat). Without these
      # the server still runs but the OAuth flow fails at the consent
      # step; static yaml bearer tokens keep working for Claude Code CLI.
      MCP_OAUTH_STORE: /data/oauth-state.json
      MCP_OAUTH_ADMIN_SECRET: ${MCP_OAUTH_ADMIN_SECRET:-}
      # Panel-based OAuth consent (recommended). When set, the consent
      # page redirects to the panel login instead of asking for an admin
      # secret. Both must be set together. Generate the signing secret
      # with: openssl rand -hex 32
      PANEL_URL: ${PANEL_URL:-}
      CONSENT_SIGNING_SECRET: ${CONSENT_SIGNING_SECRET:-}
      # Dynamic API key store and usage metering (multi-user support).
      # Both files are created automatically on first run.
      MCP_KEY_STORE: /data/keys.json
      MCP_USAGE_STORE: /data/usage.json
      # Bubblewrap per-user sandbox isolation. Uncomment to enable.
      # Requires cap_add: [SYS_ADMIN] and cgroupns: host (see below).
      # MCP_ISOLATION: bwrap
      # Todoist integration (optional). If unset, Todoist tools are not
      # registered and the server starts normally without task management.
      TODOIST_API_KEY: ${TODOIST_API_KEY:-}
      # Nextcloud integration (optional). Read-only file access via WebDAV.
      # Recommended: create a dedicated Nextcloud user (e.g. mcp-reader)
      # and share folders read-only. If unset, Nextcloud tools are not registered.
      NEXTCLOUD_URL: ${NEXTCLOUD_URL:-}
      NEXTCLOUD_USER: ${NEXTCLOUD_USER:-}
      NEXTCLOUD_PASSWORD: ${NEXTCLOUD_PASSWORD:-}
      # Trello integration (optional). Kanban board access via REST API.
      # Get credentials at https://trello.com/power-ups/admin
      TRELLO_API_KEY: ${TRELLO_API_KEY:-}
      TRELLO_API_TOKEN: ${TRELLO_API_TOKEN:-}
      # Google Calendar integration (optional). OAuth 2.0 with offline
      # refresh token. Run scripts/google-auth.py once to get the refresh
      # token, then paste all three values here.
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REFRESH_TOKEN: ${GOOGLE_REFRESH_TOKEN:-}
    volumes:
      # Bind-mount the whole /data dir so oauth-state.json can be
      # created by the container user (uid 1000) on first run. The
      # individual auth.yaml bind-mount above is kept read-only as an
      # extra guard against accidental writes.
      - ./data:/data
      - ./data/auth.yaml:/data/auth.yaml:ro
      # Per-user sandbox state (bwrap isolation). Directory is created
      # automatically on first run; harmless when isolation is disabled.
      - ./data/users:/data/users
      # Unix socket directory for bwrap isolation mode.
      # Shared between host and container so sidecars can reach the socket.
      - /run/mcp-brain:/run/mcp-brain
    # ── Bubblewrap isolation requirements ─────────────────────────────────
    # cap_add: [SYS_ADMIN] is required for user-namespace creation inside
    # the container (bwrap --unshare-user). cgroupns: host lets the sandbox
    # delegate into real cgroup v2 slices instead of a virtual namespace.
    # Both settings are safe with privileged: false.
    # Comment these out if MCP_ISOLATION is not set to bwrap.
    cap_add:
      - SYS_ADMIN
    cgroupns: host
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2"
        reservations:
          memory: 1G
          cpus: "1"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8400/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
